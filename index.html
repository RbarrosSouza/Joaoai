  <meta name="application-name" content="João.ai Finance" />

  <link rel="icon" href="/favicon/favicon.ico" sizes="any" />

  <link rel="icon" type="image/png" sizes="512x512" href="/favicon/web-app-manifest-512x512.png" />

  <title>João.ai - O amigo que cuida do seu dinheiro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              lime: '#8CB82A', // Vibrant light green from the new logos
              deep: '#0F3C28', // Deep Forest Emerald
              primary: '#175E40', // Core brand green
              secondary: '#1C7450', // Lighter accent
              background: '#F7F9F8', // Off-white base
              darkBg: '#051A10', // Ultra dark background for extreme contrast
              glass: 'rgba(255, 255, 255, 0.05)',
              glassBorder: 'rgba(255, 255, 255, 0.1)',
            },
            slate: {
              800: '#1e293b',
              600: '#475569',
              500: '#64748b',
              400: '#94a3b8',
              50: '#f8fafc',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Playfair Display', 'serif'],
          },
          boxShadow: {
            'premium': '0 10px 40px -10px rgba(6, 78, 59, 0.15)',
            'glass': '0 8px 32px 0 rgba(6, 78, 59, 0.2)',
            'glow': '0 0 20px rgba(251, 191, 36, 0.4)',
          },
          animation: {
            'fade-in': 'fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1)',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'shimmer': 'shimmer 2.5s linear infinite',
            'float': 'float 6s ease-in-out infinite',
            'morph': 'morph 8s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(30px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-1000px 0' },
              '100%': { backgroundPosition: '1000px 0' }
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #F7F9F8;
      color: #1e293b;
      letter-spacing: -0.02em;
      /* Premium Background Gradient Spotlight */
      background-image:
        radial-gradient(circle at 15% 50%, rgba(149, 189, 35, 0.03) 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(19, 51, 38, 0.02) 0%, transparent 25%);
      background-attachment: fixed;
    }

    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Premium Card Style */
    .card-base {
      background-color: #FFFFFF;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 25px -4px rgba(19, 51, 38, 0.03);
      /* Sombra ainda mais difusa */
      border-radius: 1.5rem;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    }

    /* Glass effect for overlays */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* iOS Safe Area Utilities */
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .pt-safe {
      padding-top: env(safe-area-inset-top);
    }

    input,
    select {
      transition: all 0.2s ease;
    }

    input::placeholder {
      letter-spacing: normal;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>

</head>
